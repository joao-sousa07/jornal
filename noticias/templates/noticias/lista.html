<!DOCTYPE html>
<html>
<head>
    <title>Jornal Diário</title>
</head>
<body>
    <h1>Jornal Diário</h1>

    {% for noticia in noticias %}
        <div>
            <!-- LINK para abrir a notícia -->
            <h2>
                <a href="/noticia/{{ noticia.id }}/">
                    {{ noticia.titulo }}
                </a>
            </h2>

            <!-- Conteúdo -->
            <p>{{ noticia.conteudo }}</p>

            <!-- Data (corrigido o nome) -->
            <small>{{ noticia.data }}</small>
        </div>
        <hr>
    {% endfor %}

</body>
</html>
